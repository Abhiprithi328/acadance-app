spring.application.name=acadance
server.port=8080

# Database connection is built in DataSourceConfig.java from a single DATABASE_URL env var
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT secret - set as an environment variable on Render, never commit the real value
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=604800000
